name = "aiengineercv-free"
main = "src/index.ts"
compatibility_date = "2024-11-01"

# Non-secret config (edit freely). Secrets (OPENROUTER_API_KEY, TOKEN_SECRET) are NOT here -
# they are set via the GitHub Action's `secrets` input or `wrangler secret put`.
[vars]
OPENROUTER_MODEL = "deepseek/deepseek-chat-v3-0324"
ALLOWED_ORIGINS = "https://sebuzdugan.github.io,http://localhost:5173,http://localhost:4174"
INITIAL_FREE_TRIES = "1"
FOLLOW_BONUS = "2"
MAX_TRIES_CAP = "12"
# Abuse + cost protection: max free generations per IP per day, and across everyone per day.
IP_DAILY_CAP = "3"
GLOBAL_DAILY_CAP = "500"

# Create a KV namespace once, then paste its id here:
#   npx wrangler kv namespace create FREE
# (or create it in the Cloudflare dashboard: Storage & Databases > KV)
[[kv_namespaces]]
binding = "FREE"
id = "697630bf7cb34c08ac3a77c070552b92"
